<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Aegis-X | إنشاء حساب جديد</title>

  <!-- Tailwind CSS & DaisyUI CDN -->
  <link href="https://cdn.jsdelivr.net/npm/daisyui@3.9.0/dist/full.css" rel="stylesheet" type="text/css" />
  <script src="https://cdn.tailwindcss.com"></script>

  <!-- Google Fonts Cairo -->
  <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@300;400;500;600;700;800;900&display=swap" rel="stylesheet">
  
  <!-- Custom Styling -->
  <script src="security.js"></script>
  <script src="theme.js"></script>
  <link rel="stylesheet" href="styles.css" />

  <style>
    body {
      font-family: 'Cairo', sans-serif;
    }
    .register-container {
      max-width: 480px;
    }
  </style>

  <!-- Redirect script if already logged in -->
  <script>
    (function() {
      const user = JSON.parse(sessionStorage.getItem('aegis_user') || 'null');
      if (user && user.role) {
        if (user.role === 'student') window.location.href = 'student_dashboard.html';
        else if (user.role === 'teacher') window.location.href = 'teacher_dashboard.html';
        else if (user.role === 'institution') window.location.href = 'institution_dashboard.html';
      }
    })();
  </script>
</head>

<body class="glow-grid min-h-screen flex flex-col justify-between p-4">

  <!-- Header -->
  <header class="max-w-6xl mx-auto w-full flex items-center justify-between py-4">
    <a href="index.html" class="flex items-center gap-3">
      <div class="w-8 h-8 rounded-lg bg-gradient-to-tr from-teal-500 to-blue-600 flex items-center justify-center text-white font-black text-sm">
        Æ
      </div>
      <span class="text-sm font-bold text-slate-300">Aegis-X Smart LMS</span>
    </a>
    <a href="login.html" class="text-xs font-semibold text-teal-400 hover:text-teal-300">لديك حساب بالفعل؟ دخول &larr;</a>
  </header>

  <!-- Register Form Container -->
  <main class="w-full flex-1 flex items-center justify-center py-6">
    <div class="register-container w-full card glass-panel rounded-3xl border border-slate-800 p-6 md:p-8 shadow-2xl relative">
      
      <div class="text-center mb-6">
        <h2 class="text-xl font-bold text-slate-200">إنشاء حساب جديد</h2>
        <p class="text-xs text-slate-400 mt-1">انضم إلى مجتمع Aegis-X الأكاديمي</p>
      </div>

      <!-- Success Display -->
      <div id="success-alert" class="hidden alert alert-success rounded-xl border border-emerald-800/40 p-4 text-xs mb-4 flex flex-col items-start gap-2">
        <p class="font-bold text-emerald-300" id="success-title">تم التسجيل بنجاح!</p>
        <p class="text-slate-200" id="success-message"></p>
        <a href="login.html" class="btn btn-sm btn-success rounded-xl text-[10px] mt-2 self-end">الانتقال لتسجيل الدخول</a>
      </div>

      <!-- Error Warning Display -->
      <div id="error-alert" class="hidden alert alert-error rounded-xl border border-red-800/40 p-3 text-xs mb-4">
        <span id="error-message"></span>
      </div>

      <!-- Form -->
      <form id="register-form" onsubmit="handleRegister(event)" class="space-y-4">
        
        <div class="grid grid-cols-1 sm:grid-cols-2 gap-4">
          <div class="form-control">
            <label class="label pt-0"><span class="label-text text-xs text-slate-400">الاسم الكامل (الرسمي):</span></label>
            <input type="text" id="official_name" required class="input input-bordered input-academic rounded-xl text-xs py-3" placeholder="أحمد محمد علي">
          </div>
          
          <div class="form-control">
            <label class="label pt-0"><span class="label-text text-xs text-slate-400">اسم المستخدم:</span></label>
            <input type="text" id="username" required class="input input-bordered input-academic rounded-xl text-xs py-3" placeholder="ahmad_99">
          </div>
        </div>

        <div class="form-control">
          <label class="label"><span class="label-text text-xs text-slate-400">البريد الإلكتروني:</span></label>
          <input type="email" id="email" required class="input input-bordered input-academic rounded-xl text-xs py-3" placeholder="name@school.com">
        </div>
        
        <div class="form-control">
          <label class="label"><span class="label-text text-xs text-slate-400">كلمة المرور:</span></label>
          <input type="password" id="password" required class="input input-bordered input-academic rounded-xl text-xs py-3" placeholder="••••••••">
        </div>

        <!-- Role picker -->
        <div class="form-control">
          <label class="label"><span class="label-text text-xs text-slate-400">نوع الحساب (الدور):</span></label>
          <select id="role" class="select select-bordered input-academic rounded-xl text-xs" onchange="toggleInstitutionField()">
            <option value="student" selected>🎓 طالب (Student)</option>
            <option value="teacher">👨‍🏫 معلم (Teacher)</option>
            <option value="institution">🏛️ مؤسسة أكاديمية (Institution)</option>
          </select>
        </div>

        <!-- Institution Selection (dynamic, displayed for teacher/student) -->
        <div id="inst-field" class="form-control">
          <label class="label flex justify-between items-center">
            <span class="label-text text-xs text-slate-400">المؤسسة الأكاديمية التابع لها:</span>
            <span id="no-inst-link" class="hidden text-[10px] text-teal-400 cursor-pointer hover:underline" onclick="redirectToInstitutionReg()">لا توجد مؤسسة مسجلة؟</span>
          </label>
          <select id="institution_id" class="select select-bordered input-academic rounded-xl text-xs">
            <!-- Populated via JS -->
            <option value="">تحميل المؤسسات الأكاديمية...</option>
          </select>
        </div>

        <button type="submit" id="submit-btn" class="btn btn-academic w-full rounded-xl text-xs font-bold py-3 mt-6">
          إنشاء الحساب التعليمي
        </button>
      </form>

    </div>
  </main>

  <!-- Footer -->
  <footer class="max-w-6xl mx-auto w-full text-center py-6 text-[10px] text-slate-600">
    Aegis-X LMS • حماية الأمان والنزاهة • 2026
  </footer>

  <!-- Logic Scripts -->
  <script>
    let institutions = [];

    // Hide/Show Institution input field depending on the selected role
    function toggleInstitutionField() {
      const role = document.getElementById('role').value;
      const instField = document.getElementById('inst-field');
      
      if (role === 'institution') {
        instField.classList.add('hidden');
      } else {
        instField.classList.remove('hidden');
      }
    }

    // Helper redirect to help user register an institution first
    function redirectToInstitutionReg() {
      document.getElementById('role').value = 'institution';
      toggleInstitutionField();
      alert('تم تحويل دور التسجيل لـ (مؤسسة). يرجى إكمال التسجيل لتسجيل مدرستك/جامعتك أولاً.');
    }

    // Fetch institutions from backend
    function loadInstitutions() {
      const select = document.getElementById('institution_id');
      const noInstLink = document.getElementById('no-inst-link');
      
      fetch('api.php?action=get_institutions')
        .then(res => res.json())
        .then(data => {
          if (data.status === 'success') {
            institutions = data.institutions || [];
            if (institutions.length === 0) {
              select.innerHTML = '<option value="">لا يوجد مؤسسات مسجلة بعد</option>';
              noInstLink.classList.remove('hidden');
            } else {
              noInstLink.classList.add('hidden');
              select.innerHTML = '<option value="">-- اختر المؤسسة الأكاديمية --</option>' +
                institutions.map(inst => `<option value="${inst.id}">${inst.official_name}</option>`).join('');
            }
          } else {
            select.innerHTML = '<option value="">فشل تحميل المؤسسات</option>';
          }
        })
        .catch(() => {
          select.innerHTML = '<option value="">خطأ في الاتصال بالخادم</option>';
        });
    }

    // Submit handler
    function handleRegister(e) {
      e.preventDefault();
      
      const form = document.getElementById('register-form');
      const errorAlert = document.getElementById('error-alert');
      const successAlert = document.getElementById('success-alert');
      const submitBtn = document.getElementById('submit-btn');

      errorAlert.classList.add('hidden');
      
      const officialName = document.getElementById('official_name').value.trim();
      const username = document.getElementById('username').value.trim();
      const email = document.getElementById('email').value.trim();
      const password = document.getElementById('password').value.trim();
      const role = document.getElementById('role').value;
      const institutionId = document.getElementById('institution_id').value;

      // Input Validation
      if (role !== 'institution' && !institutionId) {
        showError('يرجى اختيار المؤسسة الأكاديمية التابع لها.');
        return;
      }

      submitBtn.disabled = true;
      submitBtn.innerHTML = '<span class="loading loading-spinner loading-xs mr-2"></span> جاري الحفظ...';

      const payload = {
        official_name: officialName,
        username: username,
        email: email,
        password: password,
        role: role,
        institution_id: role !== 'institution' ? parseInt(institutionId) : null
      };

      fetch('api.php?action=register', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify(payload)
      })
      .then(res => res.json())
      .then(data => {
        if (data.status === 'success') {
          form.classList.add('hidden');
          
          document.getElementById('success-message').textContent = 
            role === 'teacher' 
              ? 'تم تسجيل حساب المعلم الخاص بك بنجاح. حسابك بانتظار موافقة مدير المؤسسة الأكاديمية المختارة قبل أن تتمكن من الدخول.'
              : 'تم إنشاء حسابك بنجاح! يمكنك الآن تسجيل الدخول مباشرة.';
          
          successAlert.classList.remove('hidden');
        } else {
          showError(data.message || 'حدث خطأ أثناء حفظ البيانات، يرجى المحاولة لاحقاً.');
        }
      })
      .catch(() => {
        showError('فشل الاتصال بالخادم، يرجى المحاولة مجدداً.');
      })
      .finally(() => {
        submitBtn.disabled = false;
        submitBtn.innerHTML = 'إنشاء الحساب التعليمي';
      });
    }

    function showError(msg) {
      const errorAlert = document.getElementById('error-alert');
      const errorMessage = document.getElementById('error-message');
      errorMessage.textContent = msg;
      errorAlert.classList.remove('hidden');
    }

    // Load dynamic fields on mount
    window.addEventListener('load', () => {
      loadInstitutions();
      toggleInstitutionField();
    });
  </script>

</body>
</html>
